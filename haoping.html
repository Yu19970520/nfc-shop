<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>好评生成助手</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #222;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 18px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 8px;
      text-align: center;
    }

    .desc {
      font-size: 14px;
      color: #666;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .keyword {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }

    .keyword.active {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 16px;
      color: #fff;
      background: #111;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      margin-top: 18px;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 12px;
      box-sizing: border-box;
      resize: none;
      font-size: 15px;
      line-height: 1.6;
    }

    .tip {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: #18a058;
      display: none;
    }

    .warning {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>好评生成助手</h1>
      <div class="desc">选择几个关键词，一键生成一条自然通用的入住好评。</div>

      <div class="keywords" id="keywords"></div>

      <button id="generateBtn">一键生成并复制</button>

      <textarea id="result" placeholder="生成的评价内容会显示在这里" readonly></textarea>

      <div class="tip" id="tip">已自动复制，可直接粘贴使用</div>
      <div class="warning">生成内容仅供参考，请根据真实入住体验使用。</div>
    </div>
  </div>

  <script>
    const keywordList = [
      "干净整洁",
      "服务热情",
      "入住顺利",
      "房间舒适",
      "环境安静",
      "位置方便",
      "体验满意",
      "性价比不错",
      "设施实用",
      "办理高效",
      "休息舒适",
      "整体推荐"
    ];

    const keywordBox = document.getElementById("keywords");
    const generateBtn = document.getElementById("generateBtn");
    const resultBox = document.getElementById("result");
    const tip = document.getElementById("tip");

    keywordList.forEach(word => {
      const item = document.createElement("div");
      item.className = "keyword";
      item.innerText = word;
      item.onclick = () => item.classList.toggle("active");
      keywordBox.appendChild(item);
    });

    function getSelectedKeywords() {
      return Array.from(document.querySelectorAll(".keyword.active"))
        .map(item => item.innerText);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        resultBox.removeAttribute("readonly");
        resultBox.select();
        document.execCommand("copy");
        resultBox.setAttribute("readonly", true);
      }
    }

    function localFallback(keywords) {
      const templates = [
        `整体入住体验很满意，${keywords.join("、")}都让人感觉不错，过程顺利又省心，下次有需要还会考虑。`,
        `这次入住感受很好，${keywords.join("、")}，整体体验比较舒适，服务和环境都让人满意。`,
        `入住过程很顺利，${keywords.join("、")}，整体感觉轻松舒服，是一次比较满意的住宿体验。`,
        `整体体验不错，${keywords.join("、")}都挺符合预期，住得比较安心，推荐有需要的人选择。`
      ];

      return templates[Math.floor(Math.random() * templates.length)];
    }

    function cleanReview(text) {
      const bannedWords = [
        "早餐", "早饭", "餐厅", "停车", "车位", "免费停车",
        "泳池", "健身房", "接送", "机场", "海景", "亲子",
        "会议", "发票", "洗衣", "酒店名称"
      ];

      let cleaned = text.replace(/\s+/g, "");

      bannedWords.forEach(word => {
        cleaned = cleaned.replaceAll(word, "");
      });

      return cleaned;
    }

    generateBtn.onclick = async () => {
      const selected = getSelectedKeywords();

      if (selected.length === 0) {
        alert("请至少选择一个关键词");
        return;
      }

      generateBtn.disabled = true;
      generateBtn.innerText = "正在生成...";
      tip.style.display = "none";

      try {
        const response = await fetch("/api/generate-review", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            keywords: selected
          })
        });

        let data = await response.json();
        let review = cleanReview(data.review || "");

        if (!review || review.length < 30) {
          review = localFallback(selected);
        }

        resultBox.value = review;
        await copyText(review);
        tip.style.display = "block";
      } catch (error) {
        const review = localFallback(selected);
        resultBox.value = review;
        await copyText(review);
        tip.style.display = "block";
      }

      generateBtn.disabled = false;
      generateBtn.innerText = "一键生成并复制";
    };
  </script>
</body>
</html>
