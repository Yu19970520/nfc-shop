<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>好评生成助手</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f7f8fb 0%, #eef1f6 100%);
      color: #222;
      min-height: 100vh;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 18px;
    }
    .card {
      background: #fff;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      text-align: center;
      letter-spacing: .5px;
    }
    .desc {
      font-size: 14px;
      color: #666;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 22px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 18px 0 12px;
    }
    .keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .keyword {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      transition: all .16s ease;
    }
    .keyword.active {
      background: #111;
      color: #fff;
      border-color: #111;
      transform: translateY(-1px);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      color: #fff;
      background: #111;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary {
      background: #f0f2f5;
      color: #222;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    textarea {
      width: 100%;
      min-height: 124px;
      margin-top: 18px;
      border-radius: 14px;
      border: 1px solid #ddd;
      padding: 13px;
      resize: none;
      font-size: 15px;
      line-height: 1.7;
      outline: none;
      background: #fcfcfd;
    }
    .tip {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: #17a05d;
      display: none;
      font-weight: 600;
    }
    .warning {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }
    .count {
      color: #999;
      font-size: 12px;
      text-align: right;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>好评生成助手</h1>
      <div class="desc">选择几个关键词，一键生成一条更自然的入住好评，并自动复制。</div>

      <div class="section-title">请选择关键词</div>
      <div class="keywords" id="keywords"></div>

      <div class="actions">
        <button id="generateBtn">一键生成并复制</button>
        <button class="secondary" id="copyBtn">重新复制当前内容</button>
      </div>

      <textarea id="result" placeholder="生成的评价内容会显示在这里" readonly></textarea>
      <div class="count" id="count">0 字</div>
      <div class="tip" id="tip">已自动复制，可直接粘贴使用</div>
      <div class="warning">生成内容仅供参考，请根据真实入住体验使用。</div>
    </div>
  </div>

  <script>
    const keywordList = [
      "干净整洁",
      "服务热情",
      "入住顺利",
      "房间舒适",
      "环境安静",
      "位置方便",
      "体验满意",
      "性价比不错",
      "设施实用",
      "办理高效",
      "休息舒适",
      "整体推荐"
    ];

    const bannedWords = [
      "早餐", "早饭", "餐厅", "停车", "车位", "免费停车",
      "泳池", "健身房", "接送", "机场", "海景", "亲子",
      "会议", "发票", "洗衣", "酒店名称"
    ];

    const phraseMap = {
      "干净整洁": ["房间收拾得很干净", "卫生看得出有认真打理", "进门感觉挺清爽"],
      "服务热情": ["沟通起来很顺畅", "服务态度让人舒服", "有问题回应得也比较及时"],
      "入住顺利": ["入住过程很顺", "到店后没怎么耽误时间", "办理起来很省心"],
      "房间舒适": ["房间住着挺舒服", "待在房间里挺放松", "住起来没有压迫感"],
      "环境安静": ["晚上休息比较安静", "周围不会太吵", "环境让人比较放松"],
      "位置方便": ["位置对出行很友好", "日常出行挺方便", "找起来也不费劲"],
      "体验满意": ["这次住得挺满意", "感觉比预期舒服", "体验下来挺顺心"],
      "性价比不错": ["这个价位感觉挺值", "花费和体验比较匹配", "预算内能有这样的体验还不错"],
      "设施实用": ["常用配置都够用", "日常使用没有不方便", "基础配置用起来顺手"],
      "办理高效": ["办理速度挺快", "流程安排比较利落", "前后衔接得很顺"],
      "休息舒适": ["晚上休息得不错", "住下来挺放松", "休息体验比较舒服"],
      "整体推荐": ["会愿意推荐给朋友", "之后有需要还会考虑", "整体是会推荐的选择"]
    };

    const keywordBox = document.getElementById("keywords");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const resultBox = document.getElementById("result");
    const tip = document.getElementById("tip");
    const count = document.getElementById("count");

    keywordList.forEach(word => {
      const item = document.createElement("div");
      item.className = "keyword";
      item.innerText = word;
      item.onclick = () => item.classList.toggle("active");
      keywordBox.appendChild(item);
    });

    function getSelectedKeywords() {
      return Array.from(document.querySelectorAll(".keyword.active")).map(item => item.innerText);
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      return arr.slice().sort(() => Math.random() - 0.5);
    }

    function showTip(text = "已自动复制，可直接粘贴使用") {
      tip.innerText = text;
      tip.style.display = "block";
      setTimeout(() => { tip.style.display = "none"; }, 2200);
    }

    async function copyText(text) {
      if (!text) return;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          throw new Error("clipboard unavailable");
        }
        showTip("已自动复制，可直接粘贴使用");
      } catch (e) {
        try {
          resultBox.removeAttribute("readonly");
          resultBox.select();
          document.execCommand("copy");
          resultBox.setAttribute("readonly", true);
          showTip("已自动复制，可直接粘贴使用");
        } catch (err) {
          showTip("已生成，可手动复制");
        }
      }
    }

    function cleanReview(text) {
      let cleaned = String(text || "").replace(/\s+/g, "").replace(/[“”]/g, "");
      bannedWords.forEach(word => {
        cleaned = cleaned.split(word).join("");
      });
      return cleaned;
    }

    function buildReview(keywords) {
      const selected = keywords.length ? keywords : ["体验满意"];
      const phrases = shuffle(selected)
        .slice(0, Math.min(4, selected.length))
        .map(word => pick(phraseMap[word] || [word]));

      const p1 = phrases[0] || "住下来挺舒服";
      const p2 = phrases[1] || "过程也比较省心";
      const p3 = phrases[2] || "整体感觉不错";
      const p4 = phrases[3] || "会愿意再考虑";

      const templates = [
        `这次住得挺舒服，${p1}，${p2}，整个过程没有什么麻烦，感觉挺省心的。`,
        `${p1}，${p2}，${p3}。不是那种夸张的惊喜，但住下来很踏实。`,
        `入住下来感觉挺顺，${p1}，${p2}，细节上也比较让人放心，整体满意。`,
        `这次选择还不错，${p1}，${p2}，住着舒服，也没有遇到什么影响心情的地方。`,
        `整体是轻松舒服的一次入住，${p1}，${p2}，体验自然，不会让人失望。`,
        `${p1}，${p2}，${p3}，住下来比预期顺心，推荐给需要的人。`,
        `没有过度期待，但实际住下来挺满意，${p1}，${p2}，感觉很省心。`,
        `这次入住挺顺利，${p1}，${p2}，${p4}，整体值得推荐。`,
        `住下来印象不错，${p1}，${p2}，整体节奏很顺，适合想省心入住的人。`,
        `这次体验挺自然，${p1}，${p2}，没有刻意夸张的感觉，但确实住得舒服。`
      ];

      let review = cleanReview(pick(templates));

      // 控制长度，尽量保持 30-80 字。
      if (review.length > 80) {
        const compactTemplates = [
          `这次住得挺满意，${p1}，${p2}，整体省心舒服。`,
          `${p1}，${p2}，住下来挺顺心，整体值得推荐。`,
          `入住过程很顺，${p1}，${p2}，体验比预期舒服。`
        ];
        review = cleanReview(pick(compactTemplates));
      }
      if (review.length < 30) {
        review = cleanReview(`${review}住下来比较踏实，也符合预期。`);
      }
      return review;
    }

    function setResult(text) {
      const review = cleanReview(text);
      resultBox.value = review;
      count.innerText = `${review.length} 字`;
      return review;
    }

    generateBtn.onclick = async () => {
      const selected = getSelectedKeywords();
      if (selected.length === 0) {
        alert("请至少选择一个关键词");
        return;
      }

      const review = setResult(buildReview(selected));
      generateBtn.innerText = "已生成";
      setTimeout(() => { generateBtn.innerText = "一键生成并复制"; }, 500);
      copyText(review);
    };

    copyBtn.onclick = async () => {
      await copyText(resultBox.value);
    };
  </script>
</body>
</html>
