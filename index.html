      resize: none;
      font-size: 15px;
      line-height: 1.7;
      outline: none;
      background: #fcfcfd;

    .tip {

      margin-top: 12px;
      font-size: 14px;
      color: #17a05d;
      display: none;
      font-weight: 600;
    }

      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: #888;
      line-height: 1.5;

      font-size: 12px;
      text-align: right;
      margin-top: 6px;

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      const copy = arr.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    async function copyText(text) {
      if (!text) return;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          throw new Error("clipboard unavailable");
        }
        showTip("已自动复制，可直接粘贴使用");
      } catch (e) {
        try {
          resultBox.removeAttribute("readonly");
          resultBox.select();
          document.execCommand("copy");
          resultBox.setAttribute("readonly", true);
          showTip("已自动复制，可直接粘贴使用");
        } catch (err) {
          showTip("已生成，可手动复制");
        }
      }
    }

    function cleanReview(text) {
      let cleaned = String(text || "")
        .replace(/\s+/g, "")
        .replace(/[“”]/g, "")
        .replace(/，，+/g, "，")
        .replace(/。。+/g, "。")
        .replace(/，。/g, "。");
      bannedWords.forEach(word => {
        cleaned = cleaned.split(word).join("");
      });
      return cleaned;
    }

    function bigrams(text) {
      const list = [];
      for (let i = 0; i < text.length - 1; i++) list.push(text.slice(i, i + 2));
      return new Set(list);
    }

    function similarity(a, b) {
      const A = bigrams(a);
      const B = bigrams(b);
      if (!A.size || !B.size) return 0;
      let same = 0;
      A.forEach(x => { if (B.has(x)) same++; });
      return same / Math.min(A.size, B.size);
    }

    function getHistory() {
      try { return JSON.parse(localStorage.getItem("recentLongReviews") || "[]"); }
      catch { return []; }
    }

    function saveHistory(review) {
      const history = getHistory().filter(item => item !== review);
      history.unshift(review);
      localStorage.setItem("recentLongReviews", JSON.stringify(history.slice(0, 45)));
    }

      const selected = keywords.length ? keywords : ["体验满意", "房间舒适", "入住顺利"];

      let phrases = chosen.map(word => pick(phraseMap[word] || [word]));
      while (phrases.length < 4) phrases.push(pick(neutralPhrases));
      return shuffle(phrases);
    }

      }
      if (review.length < 82) {
        review = cleanReview(`${review}${phrases[3]}，住下来还是挺舒服的。`);
      }
      if (review.length > 130) {
        review = cleanReview(`${data.o}，${phrases[0]}，${phrases[1]}，${phrases[2]}。${data.t}，${data.e}`);
      }
      if (review.length > 122) {
        review = cleanReview(`${phrases[0]}，${phrases[1]}，${phrases[2]}，这些点都比较符合预期。${data.n}，整体是一次挺顺心的入住。`);
      }
      return review;
    }

    function buildReview(keywords) {
      const history = getHistory();
      let best = "";
      let bestScore = 999;

      for (let i = 0; i < 90; i++) {
        const candidate = makeCandidate(keywords);
        if (bannedWords.some(word => candidate.includes(word))) continue;
        if (candidate.length < 65 || candidate.length > 130) continue;

        const maxSim = history.reduce((max, old) => Math.max(max, similarity(candidate, old)), 0);
        if (!history.includes(candidate) && maxSim < 0.55) {
          saveHistory(candidate);
          return candidate;
        }
        if (maxSim < bestScore) {
          bestScore = maxSim;
          best = candidate;
        }
      }

      const finalReview = best || makeCandidate(keywords);
      saveHistory(finalReview);
      return finalReview;
    }

    function setResult(text) {
      const review = cleanReview(text);
      resultBox.value = review;
      count.innerText = `${review.length} 字`;
      return review;
    }

    function cacheKeyFor(keywords) {
      return "aiReviewCache:" + keywords.slice().sort().join("|");
    }

    function getAiCache(keywords) {
      try { return JSON.parse(localStorage.getItem(cacheKeyFor(keywords)) || "[]"); }
      catch { return []; }
    }

    function saveAiCache(keywords, review) {
      try {
        const key = cacheKeyFor(keywords);
        const list = JSON.parse(localStorage.getItem(key) || "[]").filter(item => item !== review);
        list.unshift(review);
        localStorage.setItem(key, JSON.stringify(list.slice(0, 12)));
      } catch {}
    }

    function validAiReview(review) {
      if (!review) return false;
      if (review.length < 65 || review.length > 145) return false;
      if (bannedWords.some(word => review.includes(word))) return false;
      return true;
    }

    async function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    let latestRequestId = 0;

    async function polishWithDeepSeek(keywords, draft, requestId) {
      try {
        const response = await fetchWithTimeout(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            keywords,
            draft,
            mode: "hybrid_polish",
            targetLength: "80-130",
            avoid: getHistory().slice(0, 8)
          })
        }, AI_TIMEOUT_MS);

        if (!response.ok) throw new Error("api failed");
        const data = await response.json();
        const aiReview = cleanReview(data.review || "");

        if (requestId !== latestRequestId) return;
        if (validAiReview(aiReview) && similarity(aiReview, draft) < 0.92) {
          setResult(aiReview);
          saveHistory(aiReview);
          saveAiCache(keywords, aiReview);
          copyText(aiReview);
          showTip("DeepSeek 已润色并复制");
        } else {
          showTip("已先生成，可直接使用");
        }
      } catch (error) {
        if (requestId === latestRequestId) {
          showTip("已先生成，DeepSeek 稍慢时可直接使用");
        }
      } finally {
        if (requestId === latestRequestId) {
          generateBtn.disabled = false;
          generateBtn.innerText = "一键生成并复制";
        }
      }
    }

    generateBtn.onclick = async () => {
      const selected = getSelectedKeywords();
      if (selected.length === 0) {
        alert("请至少选择一个关键词");
        return;
      }

      const requestId = ++latestRequestId;

      // 1. 先用本地低重复词库秒出一版，用户马上能复制使用。
      const cached = getAiCache(selected);
      const baseReview = cached.length && Math.random() < 0.35 ? pick(cached) : buildReview(selected);
      const review = setResult(baseReview);
      saveHistory(review);
      copyText(review);

      // 2. 再让 DeepSeek 在后台润色。6.5 秒内返回就自动替换；慢了就保留本地版。
      generateBtn.disabled = true;
      generateBtn.innerText = "已先生成，AI润色中...";
      showTip("已先生成，DeepSeek 正在后台润色");
      polishWithDeepSeek(selected, review, requestId);
    };

    copyBtn.onclick = async () => {
      await copyText(resultBox.value);
    };
  </script>
</body>
